server:
  port: 8080

spring:
  application:
    name: contractlens-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/contractlens?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${contractlens.dev.datasource.password:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${contractlens.dev.jwt.secret:}
  expiration: ${JWT_EXPIRATION:86400000}

# AI Configuration
langchain4j:
  open-ai:
    chat-model:
      api-key: ${contractlens.dev.dashscope.api-key:}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
      timeout: ${DASHSCOPE_CHAT_TIMEOUT:180s}
      max-retries: ${DASHSCOPE_CHAT_MAX_RETRIES:1}
      max-tokens: ${DASHSCOPE_CHAT_MAX_TOKENS:4096}
      temperature: ${DASHSCOPE_CHAT_TEMPERATURE:0.2}
      response-format: ${DASHSCOPE_CHAT_RESPONSE_FORMAT:json_object}
      strict-json-schema: ${DASHSCOPE_CHAT_STRICT_JSON_SCHEMA:false}
      log-requests: ${DASHSCOPE_LOG_REQUESTS:false}
      log-responses: ${DASHSCOPE_LOG_RESPONSES:false}
    embedding-model:
      api-key: ${contractlens.dev.dashscope.api-key:}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
      timeout: ${DASHSCOPE_EMBEDDING_TIMEOUT:30s}
      max-retries: ${DASHSCOPE_EMBEDDING_MAX_RETRIES:1}
  chroma:
    embedding-store:
      url: ${CHROMA_URL:http://localhost:8000}
      collection-name: ${CHROMA_COLLECTION:rental_contract_knowledge}

# Neo4j Graph Database Configuration
neo4j:
  uri: ${NEO4J_URI:bolt://localhost:7687}
  username: ${NEO4J_USERNAME:neo4j}
  password: ${contractlens.dev.neo4j.password:}

# File Upload Configuration
upload:
  path: ./uploads
  allowed-types: txt,docx,pdf

contractlens:
  sse:
    timeout-ms: ${CONTRACTLENS_SSE_TIMEOUT_MS:600000}
    heartbeat-interval-ms: ${CONTRACTLENS_SSE_HEARTBEAT_INTERVAL_MS:15000}
  rag:
    mode: ${CONTRACTLENS_RAG_MODE:lightrag}
    fallback-to-legacy: ${CONTRACTLENS_RAG_FALLBACK_TO_LEGACY:true}
    probe-query: "租房合同 押金 违约金"
    retriever:
      top-k: 6
      min-score: 0.6
    graph:
      enabled: true
      top-n: 10
      content-snippet-len: 200
  lightrag:
    enabled: ${LIGHTRAG_ENABLED:true}
    base-url: ${LIGHTRAG_BASE_URL:http://localhost:9621}
    query-path: ${LIGHTRAG_QUERY_PATH:/query}
    query-mode: ${LIGHTRAG_QUERY_MODE:hybrid}
    only-need-context: ${LIGHTRAG_ONLY_NEED_CONTEXT:true}
    inputs-dir: ${LIGHTRAG_INPUTS_DIR:../lightrag/inputs}
    clear-inputs-on-rebuild: ${LIGHTRAG_CLEAR_INPUTS_ON_REBUILD:false}
